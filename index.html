<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Placement Bible — Everything You Need Before Your Placement Interview</title>
<style>
:root{
  --navy-900:#0b1f3a;--navy-grad:linear-gradient(160deg,#0b1f3a 0%,#143b6e 55%,#1e4d8c 100%);
  --blue-600:#2563eb;--blue-500:#3b82f6;--blue-400:#60a5fa;--blue-50:#eff6ff;
  --bg:#f5f8fc;--surface:#fff;--surface-2:#f8fafc;--border:#e4eaf2;--text:#0f2440;--muted:#5a6b85;--faint:#8a99b3;
  --green:#16a34a;--green-bg:#e8f7ee;--amber:#d97706;--amber-bg:#fef3e2;--red:#dc2626;--red-bg:#fdecec;
  --radius:16px;--shadow-sm:0 1px 2px rgba(15,36,64,.06);--shadow:0 8px 24px rgba(15,36,64,.08);
  --shadow-lg:0 20px 50px rgba(11,31,58,.18);--maxw:1180px;
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box}html,body{height:100%}
body{margin:0;font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.55}
a{color:inherit;text-decoration:none}button{font-family:inherit;cursor:pointer}
h1,h2,h3,h4{margin:0;line-height:1.2;letter-spacing:-.02em}p{margin:0}
.container{max-width:var(--maxw);margin:0 auto;padding:0 24px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:1px solid transparent;border-radius:12px;padding:12px 22px;font-weight:600;font-size:15px;transition:transform .12s,box-shadow .2s,background .2s}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--blue-600);color:#fff;box-shadow:0 8px 20px rgba(37,99,235,.28)}.btn-primary:hover{background:#1d4ed8}
.btn-ghost{background:transparent;color:var(--text);border-color:var(--border)}.btn-ghost:hover{background:var(--surface-2)}
.btn-light{background:#fff;color:var(--navy-900)}.btn-sm{padding:8px 14px;font-size:13.5px;border-radius:10px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm)}
.card-pad{padding:26px}.card-hover{transition:transform .18s,box-shadow .18s,border-color .18s}
.card-hover:hover{transform:translateY(-4px);box-shadow:var(--shadow);border-color:#cfdcf0}
.section{margin-bottom:40px;scroll-margin-top:90px}
.section-head{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.section-num{width:30px;height:30px;flex:none;border-radius:9px;display:grid;place-items:center;font-size:13px;font-weight:700;background:var(--blue-50);color:var(--blue-600)}
.section-title{font-size:22px;font-weight:700}.section-sub{color:var(--muted);font-size:14.5px;margin-top:2px}
.pill{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;font-size:12.5px;font-weight:600;background:var(--blue-50);color:var(--blue-600)}
.pill-soft{background:var(--surface-2);color:var(--muted);border:1px solid var(--border)}
.tag{display:inline-block;padding:6px 12px;border-radius:999px;font-size:13px;font-weight:500;background:var(--surface-2);color:var(--text);border:1px solid var(--border);margin:0 8px 8px 0}
.grid{display:grid;gap:18px}.grid-2{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:repeat(3,1fr)}.grid-4{grid-template-columns:repeat(4,1fr)}
@media(max-width:900px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}}
.kpi{padding:20px}.kpi-label{font-size:12.5px;color:var(--faint);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.kpi-value{font-size:26px;font-weight:800;margin-top:6px;color:var(--navy-900);letter-spacing:-.03em}.kpi-foot{font-size:13px;color:var(--muted);margin-top:4px}
.progress{height:10px;border-radius:999px;background:#e9eef6;overflow:hidden}.progress>span{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--blue-500),var(--blue-600));transition:width .5s}
.nav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:66px}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px;letter-spacing:-.02em;color:var(--navy-900)}
.brand-mark{width:34px;height:34px;border-radius:9px;background:var(--navy-grad);display:grid;place-items:center;color:#fff;font-weight:800}
.nav-links{display:flex;align-items:center;gap:26px}.nav-links a{color:var(--muted);font-weight:600;font-size:14.5px;cursor:pointer}.nav-links a:hover{color:var(--navy-900)}
@media(max-width:720px){.nav-links .hide-sm{display:none}}
.search{display:flex;align-items:center;gap:10px;width:100%;background:#fff;border:1px solid var(--border);border-radius:16px;padding:8px 8px 8px 18px;box-shadow:var(--shadow-lg)}
.search input{flex:1;border:none;outline:none;font-size:17px;color:var(--text);background:transparent;padding:12px 0}.search input::placeholder{color:var(--faint)}
@media(max-width:620px){.search{flex-direction:column;padding:12px;align-items:stretch}.search .btn{width:100%}}
.hero{background:var(--navy-grad);color:#fff;position:relative;overflow:hidden}
.hero::after{content:"";position:absolute;inset:0;background:radial-gradient(800px 380px at 80% -10%,rgba(96,165,250,.35),transparent 60%);pointer-events:none}
.hero-inner{position:relative;padding:86px 24px 78px;text-align:center}
.hero h1{font-size:52px;font-weight:800;max-width:880px;margin:0 auto;letter-spacing:-.03em}
.hero p.sub{color:#c6d6f0;font-size:18px;max-width:760px;margin:20px auto 34px}
.hero .search-wrap{max-width:720px;margin:0 auto}
.hero .examples{margin-top:18px;color:#9fb4d6;font-size:13.5px}.hero .examples b{color:#fff;font-weight:600;cursor:pointer}.hero .examples b:hover{text-decoration:underline}
.hero-stats{display:flex;gap:40px;justify-content:center;margin-top:50px;flex-wrap:wrap}.hero-stat .n{font-size:30px;font-weight:800}.hero-stat .l{color:#9fb4d6;font-size:13.5px}
@media(max-width:720px){.hero h1{font-size:34px}.hero p.sub{font-size:16px}}
.feature-ico{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;margin-bottom:14px}
.feature h3{font-size:17px;margin-bottom:6px}.feature p{color:var(--muted);font-size:14px}
.dash-hero{background:var(--navy-grad);color:#fff}.dash-hero-inner{padding:34px 24px 30px;display:flex;gap:22px;align-items:center;flex-wrap:wrap}
.logo-badge{width:76px;height:76px;border-radius:18px;background:#fff;display:grid;place-items:center;font-size:30px;font-weight:800;flex:none;box-shadow:var(--shadow)}
.dash-meta{display:flex;gap:22px;flex-wrap:wrap;margin-top:10px;color:#c6d6f0;font-size:14px}
.dash-layout{display:grid;grid-template-columns:220px 1fr;gap:30px;align-items:start;padding:30px 0 80px}
.dash-nav{position:sticky;top:82px}.dash-nav a{display:block;padding:9px 12px;border-radius:9px;color:var(--muted);font-size:14px;font-weight:600;cursor:pointer}
.dash-nav a:hover{background:var(--surface-2);color:var(--navy-900)}.dash-nav a.active{background:var(--blue-50);color:var(--blue-600)}
@media(max-width:960px){.dash-layout{grid-template-columns:1fr}.dash-nav{display:none}}
.checklist{list-style:none;padding:0;margin:0}
.check-item{display:flex;align-items:center;gap:12px;padding:13px 14px;border:1px solid var(--border);border-radius:12px;margin-bottom:10px;cursor:pointer;transition:background .15s,border-color .15s}
.check-item:hover{background:var(--surface-2)}.check-item.done{background:var(--green-bg);border-color:#bfe6cd}
.check-box{width:22px;height:22px;border-radius:7px;border:2px solid #c5d0e0;flex:none;display:grid;place-items:center;color:#fff;font-size:13px}
.check-item.done .check-box{background:var(--green);border-color:var(--green)}.check-item.done .check-label{text-decoration:line-through;color:var(--muted)}
.kv{display:flex;flex-direction:column;gap:14px}.kv-row{display:flex;justify-content:space-between;gap:16px;padding:10px 0;border-bottom:1px dashed var(--border)}
.kv-row:last-child{border-bottom:none}.kv-key{color:var(--muted);font-size:14px}.kv-val{font-weight:600;text-align:right}
.swot{display:grid;grid-template-columns:1fr 1fr;gap:16px}@media(max-width:760px){.swot{grid-template-columns:1fr}}
.swot-box{border-radius:14px;padding:20px;border:1px solid var(--border)}.swot-box h4{font-size:15px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.swot-box ul{margin:0;padding-left:18px;font-size:14px}.swot-box li{margin-bottom:7px}
.swot-s{background:var(--green-bg);border-color:#c7ebd5}.swot-w{background:var(--red-bg);border-color:#f6cccc}.swot-o{background:var(--blue-50);border-color:#cfe0fb}.swot-t{background:var(--amber-bg);border-color:#f7ddb4}
.acc-item{border:1px solid var(--border);border-radius:14px;margin-bottom:12px;overflow:hidden;background:#fff}
.acc-head{display:flex;align-items:center;gap:14px;padding:16px 18px;cursor:pointer}
.acc-step{width:30px;height:30px;flex:none;border-radius:9px;background:var(--navy-900);color:#fff;display:grid;place-items:center;font-weight:700;font-size:14px}
.acc-title{font-weight:700;font-size:15.5px}.acc-chev{margin-left:auto;color:var(--faint);transition:transform .2s}.acc-item.open .acc-chev{transform:rotate(180deg)}
.acc-body{padding:0 18px 18px 62px}.acc-body h5{margin:14px 0 6px;font-size:13px;text-transform:uppercase;letter-spacing:.04em;color:var(--faint)}
.acc-body ul{margin:0;padding-left:18px;color:var(--muted);font-size:14px}.acc-body li{margin-bottom:5px}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.tab{padding:8px 16px;border-radius:999px;border:1px solid var(--border);background:#fff;font-weight:600;font-size:14px;color:var(--muted)}
.tab.active{background:var(--navy-900);color:#fff;border-color:var(--navy-900)}
.qa{border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px}.qa b{font-weight:600}.qa b::before{content:"Q. ";color:var(--blue-600)}
.coach{display:flex;flex-direction:column;height:460px}.coach-log{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px}
.msg{max-width:80%;padding:12px 15px;border-radius:14px;font-size:14.5px;white-space:pre-line}
.msg.bot{background:var(--surface-2);border:1px solid var(--border);border-bottom-left-radius:4px;align-self:flex-start}
.msg.user{background:var(--blue-600);color:#fff;border-bottom-right-radius:4px;align-self:flex-end}
.coach-suggest{display:flex;gap:8px;flex-wrap:wrap;padding:0 18px 12px}
.chip{padding:7px 13px;border-radius:999px;border:1px solid var(--border);background:#fff;font-size:13px;font-weight:600;color:var(--blue-600)}.chip:hover{background:var(--blue-50)}
.coach-input{display:flex;gap:10px;padding:14px 18px;border-top:1px solid var(--border)}
.coach-input input{flex:1;border:1px solid var(--border);border-radius:12px;padding:12px 14px;font-size:14.5px;outline:none}.coach-input input:focus{border-color:var(--blue-400)}
.comp-card h4{font-size:16px;margin-bottom:4px}.comp-pos{font-size:12.5px;font-weight:700;color:var(--blue-600);margin-bottom:10px}
.footer{background:var(--navy-900);color:#aebfda;padding:50px 0 30px;margin-top:40px}
.footer .cols{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:30px}.footer h5{color:#fff;font-size:14px;margin-bottom:12px}
.footer a{display:block;color:#aebfda;font-size:13.5px;padding:4px 0;cursor:pointer}.footer a:hover{color:#fff}
.footer .bottom{border-top:1px solid #1d3358;margin-top:34px;padding-top:20px;font-size:13px;color:#7e93b8;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px}
@media(max-width:760px){.footer .cols{grid-template-columns:1fr 1fr}}
.admin-tabs{display:flex;gap:6px;border-bottom:1px solid var(--border);margin-bottom:24px;flex-wrap:wrap}
.admin-tab{padding:12px 16px;font-weight:600;font-size:14.5px;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border-top:none;border-left:none;border-right:none}
.admin-tab.active{color:var(--blue-600);border-bottom-color:var(--blue-600)}
.field{margin-bottom:16px}.field label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:6px}
.field input,.field textarea,.field select{width:100%;border:1px solid var(--border);border-radius:10px;padding:11px 13px;font-size:14.5px;font-family:inherit;outline:none;background:#fff}
.field input:focus,.field textarea:focus{border-color:var(--blue-400)}
.table{width:100%;border-collapse:collapse}.table th{text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);padding:10px 12px;border-bottom:1px solid var(--border)}
.table td{padding:12px;border-bottom:1px solid var(--border);font-size:14px}.table tr:hover td{background:var(--surface-2)}
.muted{color:var(--muted)}.center{text-align:center}.eyebrow{color:var(--blue-600);font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.08em}
.flex{display:flex}.between{justify-content:space-between}.items-center{align-items:center}.gap-8{gap:8px}.gap-12{gap:12px}.wrap{flex-wrap:wrap}
.mb-16{margin-bottom:16px}.mb-24{margin-bottom:24px}.mt-16{margin-top:16px}
.fade-in{animation:fade .4s ease}@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.ring-wrap{display:grid;place-items:center;position:relative}
.suggest-box{position:absolute;top:calc(100% + 8px);left:0;right:0;z-index:40;padding:6px;background:#fff;border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow-lg);text-align:left}
.suggest-row{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:transparent;border:none;padding:10px 12px;border-radius:10px;cursor:pointer}
.suggest-row:hover{background:var(--surface-2)}
.logo-sq{border-radius:9px;color:#fff;display:grid;place-items:center;font-weight:800;flex:none}
</style>
</head>

var CHECKLIST = ['Researched the company','Reviewed the business model','Studied the competitors','Practiced interview questions','Prepared a strong self-introduction','Completed a mock interview'];

var archetypes = {
  it_services:{label:'IT Services',
    roles:['Systems Engineer / Associate Software Engineer','Digital Specialist Engineer','Cloud / Infrastructure Engineer','Business / Process Analyst'],
    eligibility:'60% (or 6.0 CGPA) and above throughout 10th, 12th and graduation. No active backlogs. Gap of not more than 1 year in education.',
    salaryRange:'₹3.5 – 9 LPA (higher for specialist/digital roles)',
    skills:['DSA basics','OOP & DBMS','SQL','One programming language (Java/Python/C++)','Aptitude & logical reasoning','Communication'],
    hiringTimeline:'Off-campus & pool campus drives run year-round; major on-campus hiring Aug–Dec. Offer to onboarding: 2–5 months.',
    interview:[
      {stage:'Aptitude Round',desc:'Online assessment covering quantitative aptitude, logical reasoning, verbal ability, and often a basic coding/pseudo-code section.',tips:['Practice quant from R.S. Aggarwal / PrepInsta','Time management — accuracy over speed','Revise pseudo-code and output-prediction questions'],questions:['Time, speed & distance problem','Series completion / coding-decoding','Predict the output of this C/Java snippet','Reading-comprehension based verbal set']},
      {stage:'Technical Round',desc:'Interviewer probes core CS fundamentals, your resume projects, and a programming language of your choice.',tips:['Be ready to explain every line on your resume','Revise DBMS, OOP, OS and networking basics','Practice writing clean code on paper'],questions:['Explain OOP pillars with examples','Difference between primary key and unique key','Write a program to reverse a string / find duplicates','Walk me through your final-year project']},
      {stage:'HR Round',desc:'Assesses communication, cultural fit, relocation flexibility, and willingness to sign the service agreement/bond.',tips:['Know the company values and recent news','Be honest about relocation and shift flexibility','Prepare a crisp “Tell me about yourself”'],questions:['Tell me about yourself','Why do you want to join us?','Are you comfortable relocating anywhere in India?','Where do you see yourself in 5 years?']}
    ],
    faqs:{hr:['Tell me about yourself.','Why do you want to join an IT services company?','Are you okay with relocation and rotational shifts?','How do you handle pressure and deadlines?','What do you know about our company?'],
      technical:['Explain the 4 pillars of OOP.','What is normalization in DBMS?','Difference between stack and queue.','Write SQL to find the second-highest salary.','What happens when you type a URL and press enter?'],
      case:['How would you migrate a legacy app to the cloud?','A client reports a slow application — how do you debug it?'],
      behavioral:['Describe a time you worked in a team under a tight deadline.','Tell me about a conflict and how you resolved it.','A time you learned a new skill quickly.']}},
  product_tech:{label:'Product / Big Tech',
    roles:['Software Development Engineer (SDE-1)','Data Scientist / ML Engineer','Product Manager (APM)','Business / Data Analyst'],
    eligibility:'Typically 7.0+ CGPA, strong DSA/problem-solving. CS or allied branches preferred for SDE; open branches for analyst roles. Internship conversions common.',
    salaryRange:'₹15 – 50+ LPA total comp (base + RSUs + joining bonus)',
    skills:['Strong DSA (trees, graphs, DP)','System design basics','One strong language','Problem-solving under time pressure','CS fundamentals (OS, DBMS, OOP)','Behavioral / leadership stories'],
    hiringTimeline:'On-campus Aug–Oct for finals; summer internship hiring Jul–Sep for pre-finals. Offer to joining: 6–11 months.',
    interview:[
      {stage:'Online Assessment',desc:'Timed coding test on a platform (HackerRank/Codility) with 2–3 DSA problems and sometimes MCQs on CS fundamentals.',tips:['Solve 150–250 LeetCode problems (easy→medium→hard)','Master arrays, strings, trees, graphs, DP','Dry-run edge cases before submitting'],questions:['Two-pointer / sliding-window array problem','Tree traversal / lowest common ancestor','Dynamic programming (knapsack/LIS variant)','MCQs on time complexity & OS']},
      {stage:'Technical Round (DSA)',desc:'Live coding with an engineer. You explain your approach, optimise complexity, and write working code.',tips:['Think out loud — communication is scored','State brute force, then optimise','Discuss time & space complexity explicitly'],questions:['Design an LRU cache','Detect a cycle in a linked list','Number of islands (BFS/DFS)','Find median of two sorted arrays']},
      {stage:'System / Design Round',desc:'For some roles: high-level design or low-level design (machine-coding) to test scalability and OOP modelling.',tips:['Learn fundamentals: load balancing, caching, sharding, queues','Clarify requirements before designing','Discuss trade-offs, not just one answer'],questions:['Design a URL shortener','Design a rate limiter','Low-level design of a parking lot','How would you scale a notification system?']},
      {stage:'Behavioral / Bar-Raiser Round',desc:'Values and leadership-principles based. Uses your past experiences to predict how you work.',tips:['Prepare 6–8 STAR stories (Situation-Task-Action-Result)','Map stories to the company’s leadership principles','Show ownership, data-driven decisions, and impact'],questions:['Tell me about a time you disagreed with a teammate.','Describe your most challenging project.','A time you took ownership beyond your role.','How do you prioritise when everything is urgent?']}
    ],
    faqs:{hr:['Walk me through your resume.','Why this company over its competitors?','What are your salary expectations?','Tell me about a time you failed and what you learned.'],
      technical:['How does a hash map work internally?','Explain process vs thread.','Design a system to handle 1M requests/sec.','What is database indexing and when does it hurt?','Reverse a linked list in O(n).'],
      case:['Estimate the number of delivery vans needed in Bengaluru.','How would you reduce checkout abandonment on our app?'],
      behavioral:['Tell me about a time you showed ownership.','Describe a conflict with a stakeholder.','A decision you made with incomplete data.','A time you had to learn something fast.']}},
  consulting:{label:'Consulting',
    roles:['Business Analyst / Associate Analyst','Consultant (Strategy / Technology / Risk)','Advisory / Audit Associate','Data & AI Consultant'],
    eligibility:'Strong academics (usually 65%+ / 7.0+ CGPA), no backlogs, excellent communication and structured-thinking ability. Open to most disciplines.',
    salaryRange:'₹7 – 16 LPA (strategy roles higher; tech/advisory mid-range)',
    skills:['Structured problem-solving','Case-interview frameworks','Business acumen','Guesstimates & mental math','Communication & storytelling','Excel / PowerPoint'],
    hiringTimeline:'On-campus placements Aug–Nov; lateral/off-campus hiring year-round. Offer to joining: 3–6 months.',
    interview:[
      {stage:'Aptitude Round',desc:'Online test on quantitative aptitude, data interpretation, logical reasoning, and verbal ability.',tips:['Practice data-interpretation sets','Brush up percentages, ratios, profit & loss','Work on reading speed for verbal'],questions:['Data interpretation on a sales table','Logical puzzle / seating arrangement','Profit & loss / ratio problem','Critical-reasoning verbal set']},
      {stage:'Case Interview',desc:'The core round. You crack a business problem live — market entry, profitability, or a guesstimate — showing structured thinking.',tips:['Learn frameworks: profitability, 4P, market entry, guesstimates','Structure first, then dive in — say your approach aloud','Always summarise with a recommendation'],questions:['Our client’s profits are falling — diagnose why.','Should an Indian D2C brand enter tier-2 cities?','Estimate the market size for electric scooters in India.','How would you improve a bank’s customer retention?']},
      {stage:'Group Discussion',desc:'Tests communication, teamwork and clarity of thought in a moderated group on a business or abstract topic.',tips:['Initiate or summarise to stand out — quality over quantity','Back points with logic/data, not volume','Let others speak; build on their points'],questions:['Is remote work good for the Indian economy?','AI will create more jobs than it destroys — discuss.','Should India prioritise growth or sustainability?']},
      {stage:'HR / Fit Round',desc:'Partner/manager round on motivation, culture fit, and your story. Tests why-consulting and why-this-firm.',tips:['Have a sharp “why consulting” and “why this firm”','Know the firm’s service lines and recent work','Show curiosity and a learning mindset'],questions:['Why consulting and why our firm?','Tell me about a leadership experience.','A time you influenced without authority.','What would you do if you disagreed with a client?']}
    ],
    faqs:{hr:['Why consulting?','Why our firm specifically?','Tell me about yourself.','Describe a leadership role you’ve held.','How do you handle ambiguity?'],
      technical:['Walk me through how you’d read a P&L statement.','What business metrics would you track for a SaaS company?','Explain a recent business news story and its impact.'],
      case:['Profitability case: revenues flat, costs rising — diagnose.','Market-entry case for a new geography.','Guesstimate: number of EVs sold in India next year.','M&A: should our client acquire competitor X?'],
      behavioral:['A time you led a team to a result.','A time you persuaded a sceptical stakeholder.','How you handled a high-pressure deadline.']}},
  fmcg:{label:'FMCG',
    roles:['Management Trainee (Sales / Marketing)','Supply Chain / Operations Trainee','Finance / HR Management Trainee','R&D / Quality Associate'],
    eligibility:'Consistent academics, strong communication, leadership exposure (PORs, internships). Often MBA/PGDM for management-trainee tracks; engineering for supply-chain/R&D.',

var ADMIN_KEY='pb_admin_companies';
function slugify(n){return (n||'').toString().trim().toLowerCase().replace(/&/g,'and').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');}
function lsGet(k,d){try{var v=JSON.parse(localStorage.getItem(k));return v==null?d:v;}catch(e){return d;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function getAdminCompanies(){return lsGet(ADMIN_KEY,{});}
function saveAdminCompany(c){var all=getAdminCompanies();var s=c.slug||slugify(c.name);all[s]=Object.assign({},c,{slug:s,_admin:true});lsSet(ADMIN_KEY,all);return s;}
function deleteAdminCompany(s){var all=getAdminCompanies();delete all[s];lsSet(ADMIN_KEY,all);}
function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function applyArchetype(c){
  var a=archetypes[c.type]||archetypes.generic;
  var merged=Object.assign({
    archetypeLabel:a.label,roles:c.roles||a.roles,eligibility:c.eligibility||a.eligibility,
    salaryRange:c.salaryRange||a.salaryRange,skills:c.skills||a.skills,hiringTimeline:c.hiringTimeline||a.hiringTimeline,
    interview:c.interview||a.interview,faqs:c.faqs||a.faqs,checklist:CHECKLIST
  },c);
  merged.industryIntel=c.industryIntel||{overview:'An overview of '+c.name+'’s industry. Add details from the company’s sector and recent news.',trends:['Key trend to research','Key trend to research','Key trend to research'],outlook:'Summarise the medium-term outlook for this sector.',kpis:[{label:'Market size',value:'—',foot:'Research'},{label:'Growth',value:'—',foot:'Research'},{label:'Key metric',value:'—',foot:'Research'},{label:'Key metric',value:'—',foot:'Research'}]};
  return merged;
}
function titleCase(s){return s.replace(/-/g,' ').replace(/\b\w/g,function(m){return m.toUpperCase();});}
function generateCompany(raw){
  var name=titleCase((raw||'').toString().trim());var slug=slugify(name);
  var initials=name.split(' ').slice(0,2).map(function(w){return w[0];}).join('').toUpperCase();
  var base={slug:slug,name:name,logo:initials||'Co',color:'#2563eb',type:'generic',industry:'Industry — to be confirmed',hq:'See official careers page',employees:'N/A',segments:['Core business segment'],presence:'Multiple markets',
    description:name+' is featured here with an auto-generated placement starter dashboard. Verify the details below against the company’s official careers page and recent news, then use the AI Coach and checklist to structure your preparation.',
    business:{revenueStreams:['Primary product / service revenue','Secondary / adjacent revenue lines'],products:['Flagship product or service','Supporting offerings'],customers:['Target customer segment(s)'],valueProp:name+'’s core value proposition — confirm from the company’s site.'},
    swot:{strengths:['Identify the company’s key strengths from its site & news'],weaknesses:['Note known challenges or weaknesses'],opportunities:['Growth opportunities in its market'],threats:['Competitive and macro threats']},
    competitors:[{name:'Competitor A',position:'Direct rival',diff:'How it differs — research this.'},{name:'Competitor B',position:'Adjacent player',diff:'How it differs — research this.'}]};
  return applyArchetype(base);
}
function resolveCompany(slug){
  var key=slugify(slug);var admin=getAdminCompanies();
  if(admin[key])return Object.assign(applyArchetype(admin[key]),{generated:false});
  if(companies[key])return Object.assign(applyArchetype(companies[key]),{generated:false});
  var all=Object.assign({},companies,admin);var hit=null;
  Object.keys(all).forEach(function(k){var c=all[k];var sc=slugify(c.name);if(!hit&&(sc===key||sc.indexOf(key)>=0||key.indexOf(sc)>=0))hit=c;});
  if(hit)return Object.assign(applyArchetype(hit),{generated:false});
  return Object.assign(generateCompany(slug),{generated:true});
}
function searchSuggestions(q){
  q=(q||'').trim().toLowerCase();if(!q)return[];
  var all=Object.assign({},companies,getAdminCompanies());var out=[];
  Object.keys(all).forEach(function(k){var c=all[k];if(out.length<6&&(c.name.toLowerCase().indexOf(q)>=0||(c.industry||'').toLowerCase().indexOf(q)>=0))out.push({slug:c.slug,name:c.name,logo:c.logo,color:c.color,industry:c.industry});});
  return out;
}

/* ---------------- AI Coach ---------------- */
var SUGGESTIONS=['Why should I join this company?','Tell me about the competitors','What HR questions can be asked?','Help me prepare for the interview','What is the expected salary?','Give me a 7-day prep plan'];
function bullets(arr,n){return arr.slice(0,n||99).map(function(x){return '• '+x;}).join('\n');}
function coachReply(c,raw){
  var q=raw.toLowerCase(),n=c.name;function has(){for(var i=0;i<arguments.length;i++){if(q.indexOf(arguments[i])>=0)return true;}return false;}
  if(has('hi','hello','hey')&&q.length<12)return "Hi! I'm your AI Placement Coach for "+n+". Ask me why to join, about competitors, the interview process, likely questions, salary, or for a prep plan.";
  if(has('why','join','should i')&&!has('competitor'))return 'Why '+n+' is a strong choice:\n'+bullets(c.swot.strengths)+'\n\nIn one line: '+c.business.valueProp+'\n\nIn an interview, frame your answer around 2 of these strengths + how the role matches your goals.';
  if(has('competitor','rival','competition','vs '))return n+"'s main competitors:\n"+c.competitors.map(function(x){return '• '+x.name+' — '+x.position+': '+x.diff;}).join('\n')+'\n\nTip: knowing how '+n+' differs from these is a classic "why us, not them?" question.';
  if(has('hr question','hr round','hr interview')||(has('hr')&&has('question')))return 'Likely HR questions at '+n+':\n'+bullets(c.faqs.hr)+'\n\nPrepare a crisp "Tell me about yourself" and a sharp "Why '+n+'?" — those two open most HR rounds.';
  if(has('technical','coding','dsa','tech round'))return 'Common technical questions for '+n+':\n'+bullets(c.faqs.technical)+'\n\nFocus your prep on: '+c.skills.slice(0,4).join(', ')+'.';
  if(has('case','guesstimate','estimate'))return 'Case / problem-solving prompts for '+n+':\n'+bullets(c.faqs.case)+'\n\nStructure first, then solve aloud, and end with a clear recommendation.';
  if(has('behavioral','behaviour','star','situational'))return 'Behavioral questions for '+n+':\n'+bullets(c.faqs.behavioral)+'\n\nAnswer with STAR — Situation, Task, Action, Result — and quantify the result.';
  if(has('salary','package','ctc','pay','compensation','lpa'))return 'Expected pay at '+n+': '+c.salaryRange+'.\n\nCommon roles: '+c.roles.slice(0,3).join(', ')+'.\nNote: actual offers vary by role, campus tier, and performance.';
  if(has('process','round','stages','how many'))return n+"'s interview process has "+c.interview.length+' stages:\n'+c.interview.map(function(r,i){return (i+1)+'. '+r.stage+' — '+r.desc;}).join('\n');
  if(has('prepare','prep','plan','ready','roadmap','study'))return 'Your prep roadmap for '+n+':\nDay 1–2: Research — business model, segments, recent news.\nDay 3: Study competitors ('+c.competitors.map(function(x){return x.name;}).slice(0,3).join(', ')+') and the SWOT.\nDay 4–5: Practise questions — start with '+c.skills.slice(0,3).join(', ')+'.\nDay 6: Prepare your intro + 5 STAR stories.\nDay 7: Full mock interview, then review.\n\nTick these off in the Placement Readiness Checklist on this page.';
  if(has('swot','strength','weakness','opportunit','threat'))return n+' SWOT snapshot:\nStrengths: '+c.swot.strengths.slice(0,2).join('; ')+'\nWeaknesses: '+c.swot.weaknesses.slice(0,2).join('; ')+'\nOpportunities: '+c.swot.opportunities.slice(0,2).join('; ')+'\nThreats: '+c.swot.threats.slice(0,2).join('; ');
  if(has('business model','revenue','make money','business'))return 'How '+n+' makes money:\n'+bullets(c.business.revenueStreams)+'\n\nValue proposition: '+c.business.valueProp;
  if(has('about','who','overview','tell me about')&&!has('competitor'))return n+' — '+c.industry+', HQ '+c.hq+'.\n'+c.description;
  if(has('skill','learn','topics'))return 'Key skills to prepare for '+n+':\n'+bullets(c.skills);
  return 'I can help with '+n+': why to join, competitors, the interview process, HR / technical / case questions, salary, required skills, or a 7-day prep plan. Try a suggestion below, or rephrase your question.';
}

function ring(percent,size,stroke,light){
  size=size||132;stroke=stroke||12;var r=(size-stroke)/2,circ=2*Math.PI*r,off=circ-(percent/100)*circ;
  var track=light?'rgba(255,255,255,.18)':'#e9eef6';var color=percent>=80?'#22c55e':percent>=50?'#60a5fa':'#f59e0b';
  return '<div class="ring-wrap" style="width:'+size+'px;height:'+size+'px">'+
    '<svg width="'+size+'" height="'+size+'" style="transform:rotate(-90deg)"><circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="'+track+'" stroke-width="'+stroke+'"/>'+
    '<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="'+stroke+'" stroke-dasharray="'+circ+'" stroke-dashoffset="'+off+'" stroke-linecap="round" style="transition:stroke-dashoffset .6s"/></svg>'+
    '<div style="position:absolute;inset:0;display:grid;place-items:center"><div style="text-align:center"><div style="font-size:'+(size*.26)+'px;font-weight:800;line-height:1;color:'+(light?'#fff':'var(--navy-900)')+'">'+percent+'%</div>'+

/* ---- Dashboard interactions ---- */
function toggleAcc(i){accOpen=accOpen===i?-1:i;document.getElementById('acc-wrap').innerHTML=interviewItems(current);}
function setFaq(t){faqTab=t;
  document.querySelectorAll('#faq .tab').forEach(function(b){b.classList.toggle('active',b.textContent.toLowerCase().indexOf(t==='hr'?'hr':t)>=0);});
  var items=(current.faqs[t]||[]);document.getElementById('faq-list').innerHTML=items.length?items.map(function(q){return '<div class="qa"><b>'+esc(q)+'</b></div>';}).join(''):'<p class="muted">No questions in this category yet.</p>';
}
function toggleCheck(i){checked[i]=!checked[i];lsSet(ckey,checked);
  document.querySelectorAll('#checklist .check-item').forEach(function(li,idx){li.classList.toggle('done',!!checked[idx]);li.querySelector('.check-box').innerHTML=checked[idx]?ico('check',14,3):'';});
  var p=pct(),done=checked.filter(Boolean).length;
  document.getElementById('check-ring').innerHTML=ring(p);
  document.getElementById('hero-ring').innerHTML=ring(p,104,10,true);
  document.getElementById('check-bar').style.width=p+'%';
  document.getElementById('check-count').textContent=done+' of '+checked.length+' complete';
  document.getElementById('check-msg').textContent=p===100?'You’re fully prepared. Go ace it! 🎯':p>=50?'Good progress — keep going.':'Just getting started. Work through the list.';
}
function coachAsk(text){if(!text||!text.trim())return;coachLog.push({from:'user',text:text});coachLog.push({from:'bot',text:coachReply(current,text)});
  var log=document.getElementById('coach-log');log.innerHTML=coachLog.map(function(m){return '<div class="msg '+m.from+'">'+esc(m.text)+'</div>';}).join('');log.scrollTop=log.scrollHeight;}
function coachSubmit(e){e.preventDefault();var inp=document.getElementById('coach-input');coachAsk(inp.value);inp.value='';}

function adminExperiences(){
  var items=lsGet('pb_experiences',[]);
  var list=items.length?items.map(function(i){var vc=i.verdict==='Selected'?'background:var(--green-bg);color:var(--green)':i.verdict==='Rejected'?'background:var(--red-bg);color:var(--red)':'background:var(--blue-50);color:var(--blue-600)';
    return '<div class="card card-pad mb-16" style="box-shadow:none"><div class="flex between items-center wrap" style="gap:8px"><div class="flex items-center gap-8 wrap"><b>'+esc(i.company)+'</b><span class="pill pill-soft">'+esc(i.role||'Role')+'</span><span class="pill pill-soft">'+esc(i.year)+'</span><span class="pill" style="'+vc+'">'+esc(i.verdict)+'</span></div><button class="btn btn-ghost btn-sm" onclick="delItem(\'pb_experiences\','+i.id+')">'+ico('trash',14)+'</button></div><p class="muted" style="font-size:14px;margin-top:10px;white-space:pre-line">'+esc(i.text)+'</p></div>';}).join(''):'<p class="muted">No experiences yet. Add one from the form.</p>';
  return '<div class="grid" style="grid-template-columns:380px 1fr;gap:24px;align-items:start">'+
   '<form class="card card-pad" onsubmit="addExp(event)"><h3 style="font-size:17px;margin-bottom:16px">Upload an interview experience</h3>'+
   '<div class="field"><label>Company *</label><input id="ex-co" placeholder="Infosys"/></div>'+
   '<div class="grid grid-2" style="gap:12px"><div class="field"><label>Role</label><input id="ex-role" placeholder="Systems Engineer"/></div><div class="field"><label>Year</label><input id="ex-year" value="2026"/></div></div>'+
   '<div class="field"><label>Verdict</label><select id="ex-verdict"><option>Selected</option><option>Rejected</option><option>In process</option></select></div>'+
   '<div class="field"><label>Experience *</label><textarea id="ex-text" rows="5" placeholder="Round-by-round account…"></textarea></div>'+
   '<button class="btn btn-primary" type="submit" style="width:100%">'+ico('plus',16)+' Publish experience</button></form>'+
   '<div class="card card-pad"><h3 style="font-size:17px;margin-bottom:14px">Submitted experiences <span class="muted" style="font-weight:400">('+items.length+')</span></h3>'+list+'</div></div>';
}
function addExp(e){e.preventDefault();var co=document.getElementById('ex-co').value,text=document.getElementById('ex-text').value;if(!co.trim()||!text.trim())return;
  var items=lsGet('pb_experiences',[]);items.unshift({id:Date.now(),company:co,role:document.getElementById('ex-role').value,year:document.getElementById('ex-year').value,verdict:document.getElementById('ex-verdict').value,text:text});
  lsSet('pb_experiences',items);document.getElementById('admin-body').innerHTML=adminBody();}

function adminQuestions(){
  var items=lsGet('pb_questions',[]);
  var rows=items.length?items.map(function(i){return '<tr><td>'+esc(i.question)+'</td><td class="muted">'+esc(i.company||'—')+'</td><td><span class="pill pill-soft">'+esc(i.category)+'</span></td><td><button class="btn btn-ghost btn-sm" onclick="delItem(\'pb_questions\','+i.id+')">'+ico('trash',14)+'</button></td></tr>';}).join(''):'<tr><td colspan="4" class="muted">No questions added yet.</td></tr>';
  return '<div class="grid" style="grid-template-columns:380px 1fr;gap:24px;align-items:start">'+
   '<form class="card card-pad" onsubmit="addQ(event)"><h3 style="font-size:17px;margin-bottom:16px">Add a placement question</h3>'+
   '<div class="field"><label>Company</label><input id="q-co" placeholder="Amazon"/></div>'+
   '<div class="field"><label>Category</label><select id="q-cat"><option>HR</option><option>Technical</option><option>Case</option><option>Behavioral</option></select></div>'+
   '<div class="field"><label>Question *</label><textarea id="q-text" rows="3" placeholder="Type the question…"></textarea></div>'+
   '<button class="btn btn-primary" type="submit" style="width:100%">'+ico('plus',16)+' Add question</button></form>'+
   '<div class="card card-pad"><h3 style="font-size:17px;margin-bottom:14px">Question bank <span class="muted" style="font-weight:400">('+items.length+')</span></h3><table class="table"><thead><tr><th>Question</th><th>Company</th><th>Category</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}
function addQ(e){e.preventDefault();var text=document.getElementById('q-text').value;if(!text.trim())return;
  var items=lsGet('pb_questions',[]);items.unshift({id:Date.now(),company:document.getElementById('q-co').value,category:document.getElementById('q-cat').value,question:text});
  lsSet('pb_questions',items);document.getElementById('admin-body').innerHTML=adminBody();}

function adminUsers(){
  var items=lsGet('pb_users',[{id:1,name:'Demo Student',email:'demo@college.edu',college:'IIT',role:'Student'}]);
  var rows=items.map(function(i){return '<tr><td style="font-weight:600">'+esc(i.name)+'</td><td class="muted">'+esc(i.email||'—')+'</td><td class="muted">'+esc(i.college||'—')+'</td><td><span class="pill pill-soft">'+esc(i.role)+'</span></td><td><button class="btn btn-ghost btn-sm" onclick="delItem(\'pb_users\','+i.id+')">'+ico('trash',14)+'</button></td></tr>';}).join('');
  return '<div class="grid" style="grid-template-columns:380px 1fr;gap:24px;align-items:start">'+
   '<form class="card card-pad" onsubmit="addUser(event)"><h3 style="font-size:17px;margin-bottom:16px">Add a user</h3>'+
   '<div class="field"><label>Name *</label><input id="u-name" placeholder="Student name"/></div>'+
   '<div class="field"><label>Email</label><input id="u-email" placeholder="name@college.edu"/></div>'+
   '<div class="field"><label>College</label><input id="u-college" placeholder="College / University"/></div>'+
   '<div class="field"><label>Role</label><select id="u-role"><option>Student</option><option>Placement Coordinator</option><option>Admin</option></select></div>'+
   '<button class="btn btn-primary" type="submit" style="width:100%">'+ico('plus',16)+' Add user</button></form>'+
   '<div class="card card-pad"><h3 style="font-size:17px;margin-bottom:14px">Users <span class="muted" style="font-weight:400">('+items.length+')</span></h3><table class="table"><thead><tr><th>Name</th><th>Email</th><th>College</th><th>Role</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}
function addUser(e){e.preventDefault();var name=document.getElementById('u-name').value;if(!name.trim())return;
  var items=lsGet('pb_users',[{id:1,name:'Demo Student',email:'demo@college.edu',college:'IIT',role:'Student'}]);
  items.unshift({id:Date.now(),name:name,email:document.getElementById('u-email').value,college:document.getElementById('u-college').value,role:document.getElementById('u-role').value});
  lsSet('pb_users',items);document.getElementById('admin-body').innerHTML=adminBody();}

function delItem(key,id){var items=lsGet(key,[]);lsSet(key,items.filter(function(i){return i.id!==id;}));document.getElementById('admin-body').innerHTML=adminBody();}

function adminAnalytics(){
  var admin=getAdminCompanies();var experiences=lsGet('pb_experiences',[]);var questions=lsGet('pb_questions',[]);var users=lsGet('pb_users',[{id:1}]);
  var all=Object.assign({},companies,admin);var total=Object.keys(all).length;
  var byType={};Object.keys(all).forEach(function(k){var t=(archetypes[all[k].type]||{}).label||'Other';byType[t]=(byType[t]||0)+1;});
  var max=Math.max.apply(null,[1].concat(Object.keys(byType).map(function(k){return byType[k];})));
  var stats=[['Companies',total,Object.keys(admin).length+' added by admin'],['Interview Experiences',experiences.length,'Submitted'],['Questions in Bank',questions.length,'Across categories'],['Registered Users',users.length,'In the platform']];
  var statHTML=stats.map(function(s){return '<div class="card kpi"><div class="kpi-label">'+s[0]+'</div><div class="kpi-value">'+s[1]+'</div><div class="kpi-foot">'+s[2]+'</div></div>';}).join('');
  var bars=Object.keys(byType).map(function(k){return '<div style="margin-bottom:14px"><div class="flex between" style="font-size:13.5px;margin-bottom:6px"><span>'+k+'</span><b>'+byType[k]+'</b></div><div class="progress"><span style="width:'+(byType[k]/max*100)+'%"></span></div></div>';}).join('');
  return '<div class="fade-in"><div class="grid grid-4 mb-24">'+statHTML+'</div>'+
   '<div class="grid grid-2"><div class="card card-pad"><h3 style="font-size:16px;margin-bottom:16px">Companies by archetype</h3>'+bars+'</div>'+
   '<div class="card card-pad"><h3 style="font-size:16px;margin-bottom:10px">Platform health</h3><div class="kv">'+
   '<div class="kv-row"><span class="kv-key">Curated companies</span><span class="kv-val">'+Object.keys(companies).length+'</span></div>'+
   '<div class="kv-row"><span class="kv-key">Admin-added companies</span><span class="kv-val">'+Object.keys(admin).length+'</span></div>'+
   '<div class="kv-row"><span class="kv-key">Content items (Q + experiences)</span><span class="kv-val">'+(questions.length+experiences.length)+'</span></div>'+
   '<div class="kv-row"><span class="kv-key">Avg. questions / company</span><span class="kv-val">'+(questions.length/total).toFixed(1)+'</span></div></div>'+
   '<p class="muted" style="font-size:12.5px;margin-top:14px">Analytics are computed live from locally stored data. Connect a backend later for cross-device, multi-user analytics.</p></div></div></div>';
}

/* ---------------- Router ---------------- */
function go(path){location.hash='#'+path;}
function router(){
  var hash=location.hash.replace(/^#/,'')||'/';
  var app=document.getElementById('app');window.scrollTo(0,0);
  var m=hash.match(/^\/company\/(.+)$/);
  if(m){app.innerHTML=renderCompany(decodeURIComponent(m[1]));
    setTimeout(function(){var log=document.getElementById('coach-log');if(log)log.scrollTop=log.scrollHeight;},0);return;}
  if(hash.indexOf('/admin')===0){adminTab='companies';app.innerHTML=renderAdmin();return;}
  app.innerHTML=renderHome();
}
window.addEventListener('hashchange',router);
router();
</script>
