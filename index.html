var ADMIN_KEY='pb_admin_companies';
function slugify(n){return (n||'').toString().trim().toLowerCase().replace(/&/g,'and').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');}
function lsGet(k,d){try{var v=JSON.parse(localStorage.getItem(k));return v==null?d:v;}catch(e){return d;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function getAdminCompanies(){return lsGet(ADMIN_KEY,{});}
function saveAdminCompany(c){var all=getAdminCompanies();var s=c.slug||slugify(c.name);all[s]=Object.assign({},c,{slug:s,_admin:true});lsSet(ADMIN_KEY,all);return s;}
function deleteAdminCompany(s){var all=getAdminCompanies();delete all[s];lsSet(ADMIN_KEY,all);}
function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function applyArchetype(c){
  var a=archetypes[c.type]||archetypes.generic;
  var merged=Object.assign({
    archetypeLabel:a.label,roles:c.roles||a.roles,eligibility:c.eligibility||a.eligibility,
    salaryRange:c.salaryRange||a.salaryRange,skills:c.skills||a.skills,hiringTimeline:c.hiringTimeline||a.hiringTimeline,
    interview:c.interview||a.interview,faqs:c.faqs||a.faqs,checklist:CHECKLIST
  },c);
  merged.industryIntel=c.industryIntel||{overview:'An overview of '+c.name+'’s industry. Add details from the company’s sector and recent news.',trends:['Key trend to research','Key trend to research','Key trend to research'],outlook:'Summarise the medium-term outlook for this sector.',kpis:[{label:'Market size',value:'—',foot:'Research'},{label:'Growth',value:'—',foot:'Research'},{label:'Key metric',value:'—',foot:'Research'},{label:'Key metric',value:'—',foot:'Research'}]};
  return merged;
}
function titleCase(s){return s.replace(/-/g,' ').replace(/\b\w/g,function(m){return m.toUpperCase();});}
function generateCompany(raw){
  var name=titleCase((raw||'').toString().trim());var slug=slugify(name);
  var initials=name.split(' ').slice(0,2).map(function(w){return w[0];}).join('').toUpperCase();
  var base={slug:slug,name:name,logo:initials||'Co',color:'#4f46e5',type:'generic',industry:'Industry — to be confirmed',hq:'See official careers page',employees:'N/A',segments:['Core business segment'],presence:'Multiple markets',
    description:name+' is featured here with an auto-generated placement starter dashboard. Verify the details below against the company’s official careers page and recent news, then use the AI Coach and checklist to structure your preparation.',
    business:{revenueStreams:['Primary product / service revenue','Secondary / adjacent revenue lines'],products:['Flagship product or service','Supporting offerings'],customers:['Target customer segment(s)'],valueProp:name+'’s core value proposition — confirm from the company’s site.'},
    swot:{strengths:['Identify the company’s key strengths from its site & news'],weaknesses:['Note known challenges or weaknesses'],opportunities:['Growth opportunities in its market'],threats:['Competitive and macro threats']},
    competitors:[{name:'Competitor A',position:'Direct rival',diff:'How it differs — research this.'},{name:'Competitor B',position:'Adjacent player',diff:'How it differs — research this.'}]};
  return applyArchetype(base);
}
function resolveCompany(slug){
  var key=slugify(slug);var admin=getAdminCompanies();
  if(admin[key])return Object.assign(applyArchetype(admin[key]),{generated:false});
  if(companies[key])return Object.assign(applyArchetype(companies[key]),{generated:false});
  var all=Object.assign({},companies,admin);var hit=null;
  Object.keys(all).forEach(function(k){var c=all[k];var sc=slugify(c.name);if(!hit&&(sc===key||sc.indexOf(key)>=0||key.indexOf(sc)>=0))hit=c;});
  if(hit)return Object.assign(applyArchetype(hit),{generated:false});
  return Object.assign(generateCompany(slug),{generated:true});
}
function searchSuggestions(q){
  q=(q||'').trim().toLowerCase();if(!q)return[];
  var all=Object.assign({},companies,getAdminCompanies());var out=[];
  Object.keys(all).forEach(function(k){var c=all[k];if(out.length<6&&(c.name.toLowerCase().indexOf(q)>=0||(c.industry||'').toLowerCase().indexOf(q)>=0))out.push({slug:c.slug,name:c.name,logo:c.logo,color:c.color,industry:c.industry});});
  return out;
}

var SUGGESTIONS=['Why should I join this company?','Tell me about the competitors','What HR questions can be asked?','Help me prepare for the interview','What is the expected salary?','Give me a 7-day prep plan'];
function bullets(arr,n){return arr.slice(0,n||99).map(function(x){return '• '+x;}).join('\n');}
function coachReply(c,raw){
  var q=raw.toLowerCase(),n=c.name;function has(){for(var i=0;i<arguments.length;i++){if(q.indexOf(arguments[i])>=0)return true;}return false;}
  if(has('hi','hello','hey')&&q.length<12)return "Hi! I'm your AI Placement Coach for "+n+". Ask me why to join, about competitors, the interview process, likely questions, salary, or for a prep plan.";
  if(has('why','join','should i')&&!has('competitor'))return 'Why '+n+' is a strong choice:\n'+bullets(c.swot.strengths)+'\n\nIn one line: '+c.business.valueProp+'\n\nIn an interview, frame your answer around 2 of these strengths + how the role matches your goals.';
  if(has('competitor','rival','competition','vs '))return n+"'s main competitors:\n"+c.competitors.map(function(x){return '• '+x.name+' — '+x.position+': '+x.diff;}).join('\n')+'\n\nTip: knowing how '+n+' differs from these is a classic "why us, not them?" question.';
  if(has('hr question','hr round','hr interview')||(has('hr')&&has('question')))return 'Likely HR questions at '+n+':\n'+bullets(c.faqs.hr)+'\n\nPrepare a crisp "Tell me about yourself" and a sharp "Why '+n+'?" — those two open most HR rounds.';
  if(has('technical','coding','dsa','tech round'))return 'Common technical questions for '+n+':\n'+bullets(c.faqs.technical)+'\n\nFocus your prep on: '+c.skills.slice(0,4).join(', ')+'.';
  if(has('case','guesstimate','estimate'))return 'Case / problem-solving prompts for '+n+':\n'+bullets(c.faqs.case)+'\n\nStructure first, then solve aloud, and end with a clear recommendation.';
  if(has('behavioral','behaviour','star','situational'))return 'Behavioral questions for '+n+':\n'+bullets(c.faqs.behavioral)+'\n\nAnswer with STAR — Situation, Task, Action, Result — and quantify the result.';
  if(has('salary','package','ctc','pay','compensation','lpa'))return 'Expected pay at '+n+': '+c.salaryRange+'.\n\nCommon roles: '+c.roles.slice(0,3).join(', ')+'.\nNote: actual offers vary by role, campus tier, and performance.';
  if(has('process','round','stages','how many'))return n+"'s interview process has "+c.interview.length+' stages:\n'+c.interview.map(function(r,i){return (i+1)+'. '+r.stage+' — '+r.desc;}).join('\n');
  if(has('prepare','prep','plan','ready','roadmap','study'))return 'Your prep roadmap for '+n+':\nDay 1–2: Research — business model, segments, recent news.\nDay 3: Study competitors ('+c.competitors.map(function(x){return x.name;}).slice(0,3).join(', ')+') and the SWOT.\nDay 4–5: Practise questions — start with '+c.skills.slice(0,3).join(', ')+'.\nDay 6: Prepare your intro + 5 STAR stories.\nDay 7: Full mock interview, then review.\n\nTick these off in the Placement Readiness Checklist on this page.';
  if(has('swot','strength','weakness','opportunit','threat'))return n+' SWOT snapshot:\nStrengths: '+c.swot.strengths.slice(0,2).join('; ')+'\nWeaknesses: '+c.swot.weaknesses.slice(0,2).join('; ')+'\nOpportunities: '+c.swot.opportunities.slice(0,2).join('; ')+'\nThreats: '+c.swot.threats.slice(0,2).join('; ');
  if(has('business model','revenue','make money','business'))return 'How '+n+' makes money:\n'+bullets(c.business.revenueStreams)+'\n\nValue proposition: '+c.business.valueProp;
  if(has('about','who','overview','tell me about')&&!has('competitor'))return n+' — '+c.industry+', HQ '+c.hq+'.\n'+c.description;
  if(has('skill','learn','topics'))return 'Key skills to prepare for '+n+':\n'+bullets(c.skills);
  return 'I can help with '+n+': why to join, competitors, the interview process, HR / technical / case questions, salary, required skills, or a 7-day prep plan. Try a suggestion below, or rephrase your question.';
}

  var addedRows=added.map(function(c){return '<tr><td><a onclick="go(\'/company/'+c.slug+'\')" style="font-weight:600;color:var(--blue-600);cursor:pointer">'+esc(c.name)+'</a></td><td class="muted">'+esc(c.industry)+'</td><td><span class="pill" style="background:var(--green-bg);color:var(--green)">Added</span></td><td><button class="btn btn-ghost btn-sm" onclick="removeCompany(\''+c.slug+'\')">'+ico('trash',14)+'</button></td></tr>';}).join('');
  var curatedRows=curated.map(function(c){return '<tr><td><a onclick="go(\'/company/'+c.slug+'\')" style="font-weight:600;color:var(--blue-600);cursor:pointer">'+esc(c.name)+'</a></td><td class="muted">'+esc(c.industry)+'</td><td><span class="pill pill-soft">Curated</span></td><td><span class="muted" style="font-size:12px">built-in</span></td></tr>';}).join('');
  return '<div class="grid" style="grid-template-columns:380px 1fr;gap:24px;align-items:start">'+
   '<form class="card card-pad" onsubmit="addCompany(event)"><h3 style="font-size:17px;margin-bottom:16px">Add a company</h3>'+
   '<div class="field"><label>Company name *</label><input id="co-name" placeholder="e.g. Zomato"/></div>'+
   '<div class="field"><label>Type (archetype)</label><select id="co-type">'+typeOpts+'</select></div>'+
   '<div class="field"><label>Industry</label><input id="co-industry" placeholder="e.g. Food-tech"/></div>'+
   '<div class="grid grid-2" style="gap:12px"><div class="field"><label>Headquarters</label><input id="co-hq" placeholder="Gurugram"/></div><div class="field"><label>Employees</label><input id="co-emp" placeholder="~5,000"/></div></div>'+
   '<div class="field"><label>Salary range</label><input id="co-salary" placeholder="₹8–14 LPA"/></div>'+
   '<div class="field"><label>Segments (comma separated)</label><input id="co-seg" placeholder="Delivery, Dining, Quick-commerce"/></div>'+
   '<div class="field"><label>Value proposition</label><input id="co-vp" placeholder="One-line value prop"/></div>'+
   '<div class="field"><label>Description</label><textarea id="co-desc" rows="3" placeholder="Short company description"></textarea></div>'+
   '<button class="btn btn-primary" type="submit" style="width:100%">'+ico('plus',16)+' Save company</button>'+
   '<p class="muted" style="font-size:12.5px;margin-top:10px">Interview rounds, FAQs and skills are auto-filled from the chosen archetype.</p></form>'+
   '<div class="card card-pad"><h3 style="font-size:17px;margin-bottom:14px">Company directory <span class="muted" style="font-weight:400">('+(curated.length+added.length)+')</span></h3>'+
   '<table class="table"><thead><tr><th>Company</th><th>Industry</th><th>Source</th><th></th></tr></thead><tbody>'+addedRows+curatedRows+'</tbody></table></div></div>';
}
function addCompany(e){e.preventDefault();var name=document.getElementById('co-name').value;if(!name.trim())return;
  var seg=document.getElementById('co-seg').value;
  saveAdminCompany({name:name,type:document.getElementById('co-type').value,industry:document.getElementById('co-industry').value||'Industry',hq:document.getElementById('co-hq').value||'—',employees:document.getElementById('co-emp').value||'—',presence:'—',
    salaryRange:document.getElementById('co-salary').value||undefined,segments:seg?seg.split(',').map(function(s){return s.trim();}).filter(Boolean):['Core segment'],
    description:document.getElementById('co-desc').value||(name+' company profile.'),logo:name.trim().slice(0,2).toUpperCase(),color:'#4f46e5',
    business:{revenueStreams:['Primary revenue'],products:['Core product'],customers:['Customers'],valueProp:document.getElementById('co-vp').value||(name+'’s value proposition.')},
    swot:{strengths:['Strength'],weaknesses:['Weakness'],opportunities:['Opportunity'],threats:['Threat']},competitors:[{name:'Competitor',position:'Rival',diff:'How it differs.'}]});
  document.getElementById('admin-body').innerHTML=adminBody();
}
function removeCompany(s){deleteAdminCompany(s);document.getElementById('admin-body').innerHTML=adminBody();}

function adminExperiences(){
  var items=lsGet('pb_experiences',[]);
  var list=items.length?items.map(function(i){var vc=i.verdict==='Selected'?'background:var(--green-bg);color:var(--green)':i.verdict==='Rejected'?'background:var(--red-bg);color:var(--red)':'background:var(--blue-50);color:var(--blue-600)';
    return '<div class="card card-pad mb-16" style="box-shadow:none"><div class="flex between items-center wrap" style="gap:8px"><div class="flex items-center gap-8 wrap"><b>'+esc(i.company)+'</b><span class="pill pill-soft">'+esc(i.role||'Role')+'</span><span class="pill pill-soft">'+esc(i.year)+'</span><span class="pill" style="'+vc+'">'+esc(i.verdict)+'</span></div><button class="btn btn-ghost btn-sm" onclick="delItem(\'pb_experiences\','+i.id+')">'+ico('trash',14)+'</button></div><p class="muted" style="font-size:14px;margin-top:10px;white-space:pre-line">'+esc(i.text)+'</p></div>';}).join(''):'<p class="muted">No experiences yet. Add one from the form.</p>';
  return '<div class="grid" style="grid-template-columns:380px 1fr;gap:24px;align-items:start">'+
   '<form class="card card-pad" onsubmit="addExp(event)"><h3 style="font-size:17px;margin-bottom:16px">Upload an interview experience</h3>'+
   '<div class="field"><label>Company *</label><input id="ex-co" placeholder="Infosys"/></div>'+
   '<div class="grid grid-2" style="gap:12px"><div class="field"><label>Role</label><input id="ex-role" placeholder="Systems Engineer"/></div><div class="field"><label>Year</label><input id="ex-year" value="2026"/></div></div>'+
   '<div class="field"><label>Verdict</label><select id="ex-verdict"><option>Selected</option><option>Rejected</option><option>In process</option></select></div>'+
   '<div class="field"><label>Experience *</label><textarea id="ex-text" rows="5" placeholder="Round-by-round account…"></textarea></div>'+
   '<button class="btn btn-primary" type="submit" style="width:100%">'+ico('plus',16)+' Publish experience</button></form>'+
   '<div class="card card-pad"><h3 style="font-size:17px;margin-bottom:14px">Submitted experiences <span class="muted" style="font-weight:400">('+items.length+')</span></h3>'+list+'</div></div>';
}
function addExp(e){e.preventDefault();var co=document.getElementById('ex-co').value,text=document.getElementById('ex-text').value;if(!co.trim()||!text.trim())return;
  var items=lsGet('pb_experiences',[]);items.unshift({id:Date.now(),company:co,role:document.getElementById('ex-role').value,year:document.getElementById('ex-year').value,verdict:document.getElementById('ex-verdict').value,text:text});
  lsSet('pb_experiences',items);document.getElementById('admin-body').innerHTML=adminBody();}

function adminQuestions(){
  var items=lsGet('pb_questions',[]);
  var rows=items.length?items.map(function(i){return '<tr><td>'+esc(i.question)+'</td><td class="muted">'+esc(i.company||'—')+'</td><td><span class="pill pill-soft">'+esc(i.category)+'</span></td><td><button class="btn btn-ghost btn-sm" onclick="delItem(\'pb_questions\','+i.id+')">'+ico('trash',14)+'</button></td></tr>';}).join(''):'<tr><td colspan="4" class="muted">No questions added yet.</td></tr>';
  return '<div class="grid" style="grid-template-columns:380px 1fr;gap:24px;align-items:start">'+
   '<form class="card card-pad" onsubmit="addQ(event)"><h3 style="font-size:17px;margin-bottom:16px">Add a placement question</h3>'+
   '<div class="field"><label>Company</label><input id="q-co" placeholder="Amazon"/></div>'+
   '<div class="field"><label>Category</label><select id="q-cat"><option>HR</option><option>Technical</option><option>Case</option><option>Behavioral</option></select></div>'+
   '<div class="field"><label>Question *</label><textarea id="q-text" rows="3" placeholder="Type the question…"></textarea></div>'+
   '<button class="btn btn-primary" type="submit" style="width:100%">'+ico('plus',16)+' Add question</button></form>'+
   '<div class="card card-pad"><h3 style="font-size:17px;margin-bottom:14px">Question bank <span class="muted" style="font-weight:400">('+items.length+')</span></h3><table class="table"><thead><tr><th>Question</th><th>Company</th><th>Category</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}
function addQ(e){e.preventDefault();var text=document.getElementById('q-text').value;if(!text.trim())return;
  var items=lsGet('pb_questions',[]);items.unshift({id:Date.now(),company:document.getElementById('q-co').value,category:document.getElementById('q-cat').value,question:text});
  lsSet('pb_questions',items);document.getElementById('admin-body').innerHTML=adminBody();}

function adminUsers(){
  var items=lsGet('pb_users',[{id:1,name:'Demo Student',email:'demo@college.edu',college:'IIT',role:'Student'}]);
  var rows=items.map(function(i){return '<tr><td style="font-weight:600">'+esc(i.name)+'</td><td class="muted">'+esc(i.email||'—')+'</td><td class="muted">'+esc(i.college||'—')+'</td><td><span class="pill pill-soft">'+esc(i.role)+'</span></td><td><button class="btn btn-ghost btn-sm" onclick="delItem(\'pb_users\','+i.id+')">'+ico('trash',14)+'</button></td></tr>';}).join('');

   '<div class="field"><label>Name *</label><input id="u-name" placeholder="Student name"/></div>'+
   '<div class="field"><label>Email</label><input id="u-email" placeholder="name@college.edu"/></div>'+
   '<div class="field"><label>College</label><input id="u-college" placeholder="College / University"/></div>'+
   '<div class="field"><label>Role</label><select id="u-role"><option>Student</option><option>Placement Coordinator</option><option>Admin</option></select></div>'+
   '<button class="btn btn-primary" type="submit" style="width:100%">'+ico('plus',16)+' Add user</button></form>'+
   '<div class="card card-pad"><h3 style="font-size:17px;margin-bottom:14px">Users <span class="muted" style="font-weight:400">('+items.length+')</span></h3><table class="table"><thead><tr><th>Name</th><th>Email</th><th>College</th><th>Role</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}
function addUser(e){e.preventDefault();var name=document.getElementById('u-name').value;if(!name.trim())return;
  var items=lsGet('pb_users',[{id:1,name:'Demo Student',email:'demo@college.edu',college:'IIT',role:'Student'}]);
  items.unshift({id:Date.now(),name:name,email:document.getElementById('u-email').value,college:document.getElementById('u-college').value,role:document.getElementById('u-role').value});
  lsSet('pb_users',items);document.getElementById('admin-body').innerHTML=adminBody();}

function delItem(key,id){var items=lsGet(key,[]);lsSet(key,items.filter(function(i){return i.id!==id;}));document.getElementById('admin-body').innerHTML=adminBody();}

function adminAnalytics(){
  var admin=getAdminCompanies();var experiences=lsGet('pb_experiences',[]);var questions=lsGet('pb_questions',[]);var users=lsGet('pb_users',[{id:1}]);
  var all=Object.assign({},companies,admin);var total=Object.keys(all).length;
  var byType={};Object.keys(all).forEach(function(k){var t=(archetypes[all[k].type]||{}).label||'Other';byType[t]=(byType[t]||0)+1;});
  var max=Math.max.apply(null,[1].concat(Object.keys(byType).map(function(k){return byType[k];})));
  var stats=[['Companies',total,Object.keys(admin).length+' added by admin'],['Interview Experiences',experiences.length,'Submitted'],['Questions in Bank',questions.length,'Across categories'],['Registered Users',users.length,'In the platform']];
  var statHTML=stats.map(function(s){return '<div class="card kpi"><div class="kpi-label">'+s[0]+'</div><div class="kpi-value">'+s[1]+'</div><div class="kpi-foot">'+s[2]+'</div></div>';}).join('');
  var bars=Object.keys(byType).map(function(k){return '<div style="margin-bottom:14px"><div class="flex between" style="font-size:13.5px;margin-bottom:6px"><span>'+k+'</span><b>'+byType[k]+'</b></div><div class="progress"><span style="width:'+(byType[k]/max*100)+'%"></span></div></div>';}).join('');
  return '<div class="fade-in"><div class="grid grid-4 mb-24">'+statHTML+'</div>'+
   '<div class="grid grid-2"><div class="card card-pad"><h3 style="font-size:16px;margin-bottom:16px">Companies by archetype</h3>'+bars+'</div>'+
   '<div class="card card-pad"><h3 style="font-size:16px;margin-bottom:10px">Platform health</h3><div class="kv">'+
   '<div class="kv-row"><span class="kv-key">Curated companies</span><span class="kv-val">'+Object.keys(companies).length+'</span></div>'+
   '<div class="kv-row"><span class="kv-key">Admin-added companies</span><span class="kv-val">'+Object.keys(admin).length+'</span></div>'+
   '<div class="kv-row"><span class="kv-key">Content items (Q + experiences)</span><span class="kv-val">'+(questions.length+experiences.length)+'</span></div>'+
   '<div class="kv-row"><span class="kv-key">Avg. questions / company</span><span class="kv-val">'+(questions.length/total).toFixed(1)+'</span></div></div>'+
   '<p class="muted" style="font-size:12.5px;margin-top:14px">Analytics are computed live from locally stored data. Connect a backend later for cross-device, multi-user analytics.</p></div></div></div>';
}

/* ---------------- Router ---------------- */
function go(path){location.hash='#'+path;}
function router(){
  var hash=location.hash.replace(/^#/,'')||'/';
  var app=document.getElementById('app');window.scrollTo(0,0);
  var m=hash.match(/^\/company\/(.+)$/);
  if(m){app.innerHTML=renderCompany(decodeURIComponent(m[1]));
    setTimeout(function(){var log=document.getElementById('coach-log');if(log)log.scrollTop=log.scrollHeight;},0);return;}
  if(hash.indexOf('/admin')===0){adminTab='companies';app.innerHTML=renderAdmin();return;}
  app.innerHTML=renderHome();
}
window.addEventListener('hashchange',router);
router();
</script>
